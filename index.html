<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prohorizon MIS | OPTIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --pro-red: #D32F2F; --ref-grey: #666666; --border-grey: #cccccc; }
        th { 
            position: sticky; top: 0; background: var(--ref-grey) !important; 
            color: white !important; z-index: 10; padding: 10px; font-size: 10px; 
            text-transform: uppercase; border: 1px solid #555555; 
        }
        td { padding: 8px 10px; border: 1px solid #e5e7eb; font-size: 11px; color: #1e293b; }
        tr:nth-child(even) { background-color: #f9fafb; }
        .border-custom { border: 1px solid var(--border-grey); }
        .table-container { max-height: 450px; overflow-y: auto; border: 1px solid var(--border-grey); }
        .btn-action { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; cursor: pointer; }
    </style>
</head>
<body class="bg-[#fcfcfc] p-4 font-sans text-slate-900">

    <div class="bg-white rounded shadow-sm mb-4 border-t-4 border-[#D32F2F] p-4 border-custom">
        <div class="flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="h-10 border-l-4 border-slate-700 pl-3">
                    <h1 class="text-xl font-black">PROHORIZON <span class="text-[#D32F2F]">DIGITECH</span></h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Loan Origination System | OPTIM</p>
                </div>
            </div>
            <div class="flex items-end gap-2">
                <button onclick="loadData()" class="bg-[#666666] text-white px-5 py-2 rounded text-[10px] font-black uppercase tracking-widest">Refresh Live Data</button>
            </div>
        </div>
    </div>

    <div class="mb-6">
        <div class="bg-slate-100 px-3 py-2 text-[10px] font-black uppercase border-custom border-b-0 rounded-t">Overall Project Summary</div>
        <div class="bg-white shadow-sm overflow-x-auto border-custom rounded-b">
            <table class="w-full text-center">
                <thead>
                    <tr>
                        <th class="text-left">Project Name</th>
                        <th>Total</th><th>Pending</th><th>Resolved</th>
                        <th>SR</th><th>CR</th><th>Repeat</th><th>Support</th><th>Feature</th>
                    </tr>
                </thead>
                <tbody id="projectSummary"></tbody>
            </table>
        </div>
    </div>

    <div class="mb-6">
        <div class="bg-[#666666] text-white px-3 py-2 flex justify-between items-center rounded-t border-custom border-b-0">
            <span class="text-[10px] font-black uppercase">Assignee Wise Breakdown</span>
            <div class="flex gap-2">
                <button onclick="exportTable('assigneeTable', 'Assignee_Report')" class="btn-action bg-white text-slate-800">Export Excel</button>
                <button onclick="shareAssigneeWhatsApp()" class="btn-action bg-[#25D366] text-white">Share WhatsApp</button>
            </div>
        </div>
        <div class="bg-white shadow-sm table-container border-custom rounded-b">
            <table class="w-full text-center" id="assigneeTable">
                <thead>
                    <tr>
                        <th class="text-left">Project</th><th class="text-left">Assignee</th>
                        <th>Total</th><th>Pending</th><th>Resolved</th>
                        <th>SR</th><th>CR</th><th>Repeat</th><th>Support</th><th>Feature</th>
                    </tr>
                </thead>
                <tbody id="assigneeResolution"></tbody>
            </table>
        </div>
    </div>

    <div class="mb-10">
        <div class="bg-[#D32F2F] text-white p-2.5 flex justify-between items-center rounded-t shadow-md">
            <span id="detailTitle" class="text-[10px] font-black uppercase tracking-widest">TICKET DETAILS</span>
            <div class="flex gap-2 items-center">
                <input type="text" id="searchBox" onkeyup="searchTable()" placeholder="SEARCH..." class="text-black font-bold p-1 px-3 text-[10px] w-40 rounded-sm outline-none">
                <button onclick="exportTable('detailsTable', 'Ticket_Details')" class="btn-action bg-white text-slate-800">Export Excel</button>
                <button onclick="shareDetailsWhatsApp()" class="btn-action bg-[#25D366] text-white">Share WhatsApp</button>
            </div>
        </div>
        <div class="bg-white shadow-lg table-container border-custom rounded-b">
            <table class="w-full border-collapse" id="detailsTable">
                <thead>
                    <tr>
                        <th>ID</th><th class="text-left">Project</th><th class="text-left">Subject</th>
                        <th>Tracker</th><th>Status</th><th class="text-left">Assignee</th>
                        <th>Created</th><th>Age</th>
                    </tr>
                </thead>
                <tbody id="ticketTable"></tbody>
            </table>
        </div>
    </div>

<script>
    const API = "/api/issues";
    let allIssues = [];

    const isRes = (s) => ["Resolved", "Closed", "Rejected", "Completed"].includes(s);

    async function loadData() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            allIssues = data.issues || [];
            renderDashboard();
        } catch (err) {
            console.error("Fetch failed:", err);
        }
    }

    function renderDashboard() {
        renderProjectSummary();
        renderAssigneeBreakdown();
        renderTickets(allIssues);
    }

    function renderProjectSummary() {
        const pMap = {};
        allIssues.forEach(i => {
            const p = i.project.name;
            if(!pMap[p]) pMap[p] = { total:0, pend:0, res:0, SR:0, CR:0, RSR:0, SUP:0, FEA:0 };
            pMap[p].total++;
            if(isRes(i.status.name)) pMap[p].res++;
            else {
                pMap[p].pend++;
                const t = i.tracker.name;
                if(t==="SR") pMap[p].SR++;
                else if(t==="CR") pMap[p].CR++;
                else if(t==="Repeated SR") pMap[p].RSR++;
                else if(t==="Support") pMap[p].SUP++;
                else if(t==="Feature") pMap[p].FEA++;
            }
        });

        let html = "";
        Object.keys(pMap).forEach(name => {
            const d = pMap[name];
            html += `<tr><td class="text-left font-bold">${name}</td><td>${d.total}</td><td class="text-red-600 font-bold">${d.pend}</td><td class="text-green-600 font-bold">${d.res}</td><td>${d.SR}</td><td>${d.CR}</td><td>${d.RSR}</td><td>${d.SUP}</td><td>${d.FEA}</td></tr>`;
        });
        document.getElementById("projectSummary").innerHTML = html;
    }

    function renderAssigneeBreakdown() {
        const uMap = {};
        allIssues.forEach(i => {
            const key = `${i.project.name}|${i.assigned_to?.name || "Unassigned"}`;
            if(!uMap[key]) uMap[key] = { p: i.project.name, u: i.assigned_to?.name || "Unassigned", total:0, pend:0, res:0 };
            uMap[key].total++;
            isRes(i.status.name) ? uMap[key].res++ : uMap[key].pend++;
        });

        let html = "";
        Object.values(uMap).forEach(d => {
            html += `<tr><td class="text-left">${d.p}</td><td class="text-left font-bold">${d.u}</td><td>${d.total}</td><td class="text-red-600 font-bold">${d.pend}</td><td class="text-green-600 font-bold">${d.res}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
        });
        document.getElementById("assigneeResolution").innerHTML = html;
    }

    function renderTickets(list) {
        document.getElementById("ticketTable").innerHTML = list.map(i => {
            const diffHrs = Math.floor((Date.now() - new Date(i.created_on)) / 3600000);
            const age = diffHrs < 24 ? `${diffHrs}h` : `${Math.floor(diffHrs/24)}d`;
            return `<tr>
                <td class="font-bold text-red-600 underline"><a href="https://redmine.prohorizon.in:3000/issues/${i.id}" target="_blank">${i.id}</a></td>
                <td class="text-left">${i.project.name}</td><td class="text-left truncate max-w-xs">${i.subject}</td>
                <td>${i.tracker.name}</td><td><span class="px-2 py-0.5 rounded text-[9px] text-white ${isRes(i.status.name)?'bg-green-600':'bg-red-600'}">${i.status.name}</span></td>
                <td class="font-bold">${i.assigned_to?.name || "Unassigned"}</td><td>${new Date(i.created_on).toLocaleDateString('en-GB')}</td><td class="font-bold">${age}</td>
            </tr>`;
        }).join('');
    }

    function exportTable(id, name) {
        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(id)), `${name}.xlsx`);
    }

    function searchTable() {
        const term = document.getElementById("searchBox").value.toLowerCase();
        renderTickets(allIssues.filter(i => i.subject.toLowerCase().includes(term) || i.id.toString().includes(term)));
    }

    function shareDetailsWhatsApp() {
        let msg = `*OPTIM REPORT*\nTotal Issues: ${allIssues.length}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function shareAssigneeWhatsApp() {
        let msg = `*ASSIGNEE LOAD*\n`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    window.onload = loadData;
</script>
</body>
</html>
